<svg width="1600" height="600" viewBox="0 0 1600 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="gDark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d0a1e"/>
      <stop offset="100%" stop-color="#050816"/>
    </linearGradient>
    <filter id="glow2" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bgshadow" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="25" result="b"/>
      <feOffset dx="0" dy="8"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ─── DARK VERSION ─── -->
  <!-- Background -->
  <rect width="1600" height="600" fill="url(#gDark)"/>

  <!-- Subtle glow -->
  <ellipse cx="260" cy="300" rx="200" ry="200" fill="#8b5cf6" opacity="0.08"/>

  <!-- Icon badge circle -->
  <circle cx="260" cy="300" r="210" fill="#0f0a28" stroke="url(#g1)" stroke-width="3" opacity="0.9"/>
  <circle cx="260" cy="300" r="190" fill="none" stroke="url(#g1)" stroke-width="1.5" opacity="0.3"/>

  <!-- Lightning bolt inside circle (scale to fit circle r=190, centered at 260,300) -->
  <!-- Original bolt: 130 wide, 380 tall, centered at ~450,500 in 1024 space -->
  <!-- Scale: 190/400 ≈ 0.47, translate to 260,300 -->
  <path d="
    M 295, 120
    L 185, 315
    L 232, 315
    L 128, 490
    L 300, 285
    L 253, 285
    Z
  " fill="url(#g1)" filter="url(#glow2)"/>

  <!-- Runner dot -->
  <circle cx="210" cy="316" r="9" fill="white" opacity="0.85"/>

  <!-- Speed lines left of icon -->
  <line x1="95" y1="268" x2="158" y2="268" stroke="url(#g1)" stroke-width="5" stroke-linecap="round" opacity="0.45"/>
  <line x1="80" y1="294" x2="158" y2="294" stroke="url(#g1)" stroke-width="4" stroke-linecap="round" opacity="0.3"/>
  <line x1="95" y1="320" x2="158" y2="320" stroke="url(#g1)" stroke-width="3" stroke-linecap="round" opacity="0.2"/>

  <!-- ─── WORDMARK ─── -->
  <!-- PACE RUN -->
  <text x="510" y="240"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-size="148"
    font-weight="900"
    letter-spacing="-4"
    fill="white">PACE RUN</text>

  <!-- PRO in gradient -->
  <text x="510" y="390"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-size="148"
    font-weight="900"
    letter-spacing="8"
    fill="url(#g2)">PRO</text>

  <!-- Divider line between PACE RUN and PRO -->
  <rect x="510" y="408" width="760" height="5" fill="url(#g2)" opacity="0.4" rx="3"/>

  <!-- Tagline -->
  <text x="512" y="480"
    font-family="'Arial', Helvetica, sans-serif"
    font-size="36"
    font-weight="400"
    letter-spacing="6"
    fill="#6b7280">TECNOLOGIA PARA CORREDORES</text>

</svg>
