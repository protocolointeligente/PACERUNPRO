<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="gradBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d0a1e"/>
      <stop offset="100%" stop-color="#050816"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="18" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="40" result="blur"/>
      <feMerge><feMergeNode in="blur"/></feMerge>
    </filter>
    <clipPath id="roundedSquare">
      <rect width="1024" height="1024" rx="220" ry="220"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="220" fill="url(#gradBg)"/>

  <!-- Subtle radial glow behind bolt -->
  <ellipse cx="512" cy="500" rx="280" ry="300" fill="#8b5cf6" opacity="0.12" filter="url(#softglow)"/>

  <!-- Outer ring (thin circle arc) -->
  <circle cx="512" cy="512" r="380" fill="none" stroke="url(#grad)" stroke-width="6" opacity="0.25"/>
  <circle cx="512" cy="512" r="360" fill="none" stroke="url(#grad)" stroke-width="2" opacity="0.15"/>

  <!-- Lightning bolt — main shape -->
  <!-- Upper blade: top-right → mid-left, inner side right -->
  <!-- Lower blade: mid-right → bottom-left, inner side right -->
  <path d="
    M 610, 140
    L 390, 530
    L 490, 530
    L 410, 530
    L 265, 870
    L 635, 490
    L 535, 490
    L 610, 140
    Z
  " fill="url(#grad)" filter="url(#glow)" opacity="0.0"/>

  <!-- Clean lightning bolt (corrected path) -->
  <path d="M 605,130 L 388,522 L 498,522 L 270,875 L 638,488 L 528,488 Z"
    fill="url(#grad)" filter="url(#glow)"/>

  <!-- Small speed lines (left of bolt) -->
  <line x1="250" y1="400" x2="340" y2="400" stroke="url(#grad)" stroke-width="8" stroke-linecap="round" opacity="0.5"/>
  <line x1="220" y1="440" x2="340" y2="440" stroke="url(#grad)" stroke-width="6" stroke-linecap="round" opacity="0.35"/>
  <line x1="250" y1="480" x2="340" y2="480" stroke="url(#grad)" stroke-width="4" stroke-linecap="round" opacity="0.2"/>

  <!-- Speed lines (right of bolt) -->
  <line x1="684" y1="560" x2="774" y2="560" stroke="url(#grad)" stroke-width="8" stroke-linecap="round" opacity="0.5"/>
  <line x1="700" y1="600" x2="780" y2="600" stroke="url(#grad)" stroke-width="6" stroke-linecap="round" opacity="0.35"/>
  <line x1="684" y1="640" x2="760" y2="640" stroke="url(#grad)" stroke-width="4" stroke-linecap="round" opacity="0.2"/>

  <!-- "PRP" dot indicator (runner position) — small glowing circle -->
  <circle cx="452" cy="526" r="18" fill="white" opacity="0.9" filter="url(#glow)"/>
</svg>
