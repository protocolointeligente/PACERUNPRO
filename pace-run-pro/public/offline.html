<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PACERUNPRO offline</title>
    <style>
      :root {
        color-scheme: dark light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0a0f14;
        color: #f7f7f2;
      }
      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at 20% 0%, rgba(37, 99, 235, 0.2), transparent 28rem),
          linear-gradient(135deg, #0a0f14 0%, #101820 100%);
      }
      main {
        width: min(100%, 440px);
        border: 1px solid rgba(148, 163, 184, 0.22);
        border-radius: 24px;
        background: rgba(15, 23, 32, 0.86);
        padding: 28px;
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.28);
      }
      .logo {
        font-size: 13px;
        font-weight: 800;
        letter-spacing: 0.18em;
        color: #93c5fd;
      }
      h1 {
        margin: 18px 0 10px;
        font-size: clamp(28px, 8vw, 42px);
        line-height: 1;
      }
      p {
        margin: 0 0 20px;
        color: #b6c2d1;
        line-height: 1.55;
      }
      .actions {
        display: grid;
        gap: 10px;
      }
      a, button {
        min-height: 46px;
        border-radius: 14px;
        border: 1px solid rgba(148, 163, 184, 0.25);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0 16px;
        color: #f7f7f2;
        background: rgba(255, 255, 255, 0.06);
        font: inherit;
        font-weight: 700;
        text-decoration: none;
      }
      a.primary {
        background: #2563eb;
        border-color: #2563eb;
      }
      @media (prefers-color-scheme: light) {
        :root {
          background: #f5f7fb;
          color: #111827;
        }
        body {
          background:
            radial-gradient(circle at 20% 0%, rgba(37, 99, 235, 0.14), transparent 28rem),
            #f5f7fb;
        }
        main {
          background: rgba(255, 255, 255, 0.94);
          border-color: rgba(15, 23, 42, 0.12);
        }
        p {
          color: #475569;
        }
        a, button {
          color: #111827;
          background: #ffffff;
        }
        a.primary {
          color: #ffffff;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="logo">PACERUNPRO</div>
      <h1>Você está offline</h1>
      <p>Sem conexão agora. A última sessão aberta fica disponível quando o navegador já tiver carregado essa página antes.</p>
      <div class="actions">
        <a class="primary" id="last-session" href="/">Abrir última sessão</a>
        <button type="button" onclick="location.reload()">Tentar novamente</button>
      </div>
    </main>
    <script>
      try {
        var last = localStorage.getItem("prp:last-session-url");
        var link = document.getElementById("last-session");
        if (last && link) link.setAttribute("href", last);
      } catch (e) {}
    </script>
  </body>
</html>
